<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের সম্পর্কে - বারাকাহ ফাইন্যান্স</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Noto+Sans+Bengali:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/navbar_style.css" />
    <link rel="stylesheet" href="../style/notice_bar.css" />
    <link rel="stylesheet" href="../style/neumorphism.css" />
    <link rel="stylesheet" href="../style/new-sections.css" />
    <link rel="stylesheet" href="../style/live-counter.css" />
</head>
<body>
    <!-- Navigation (Auto-generated) -->
    <nav id="mainNav" class="neu-nav"></nav>

    <!-- Hero Section -->
    <section class="page-hero" style="background: linear-gradient(135deg, var(--cream), var(--green-50)); padding: 120px 1.5rem 4rem; text-align: center; margin-top: 80px;">
        <div class="neu-badge" style="display: inline-block; margin-bottom: 1rem;">🕌 প্রতিষ্ঠান পরিচিতি</div>
        <h1 style="font-family: 'Noto Serif Bengali', serif; font-size: 2.5rem; color: var(--dark-green); margin-bottom: 1rem;">আমাদের সম্পর্কে</h1>
        <p style="font-size: 1.1rem; color: var(--text-muted); max-width: 700px; margin: 0 auto;">বারাকাহ ফাইন্যান্স - একটি শরিয়াহসম্মত আর্থিক প্রতিষ্ঠান যা সুদমুক্ত লেনদেনে বিশ্বাসী</p>
    </section>

    <!-- Three Cards Section -->
    <section style="background: white; padding: 4rem 1.5rem;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                <!-- Committee Card -->
                <div class="neu-card neu-hover" onclick="showDetails('committee')" style="text-align: center; cursor: pointer; padding: 3rem 2rem;">
                    <div class="stat-icon" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--teal-50), var(--green-50)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; box-shadow: var(--neu-shadow-md);">
                        👔
                    </div>
                    <h3 style="font-family: 'Noto Serif Bengali', serif; font-size: 1.5rem; color: var(--dark-green); margin-bottom: 0.75rem;">কমিটি</h3>
                    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 1.5rem;">পরিচালনা পর্ষদের সদস্যবৃন্দ</p>
                    <button class="neu-btn neu-btn-primary">বিস্তারিত দেখুন</button>
                </div>

                <!-- Employees Card -->
                <div class="neu-card neu-hover" onclick="showDetails('employees')" style="text-align: center; cursor: pointer; padding: 3rem 2rem;">
                    <div class="stat-icon" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--gold), #A67C00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; box-shadow: var(--neu-shadow-md);">
                        💼
                    </div>
                    <h3 style="font-family: 'Noto Serif Bengali', serif; font-size: 1.5rem; color: var(--dark-green); margin-bottom: 0.75rem;">কর্মচারী</h3>
                    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 1.5rem;">দক্ষ কর্মচারী</p>
                    <button class="neu-btn neu-btn-gold">বিস্তারিত দেখুন</button>
                </div>

                <!-- Members Card -->
                <div class="neu-card neu-hover" onclick="showDetails('members')" style="text-align: center; cursor: pointer; padding: 3rem 2rem;">
                    <div class="stat-icon" style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--green-400), var(--teal-400)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem; box-shadow: var(--neu-shadow-md); color: white;">
                        👥
                    </div>
                    <h3 style="font-family: 'Noto Serif Bengali', serif; font-size: 1.5rem; color: var(--dark-green); margin-bottom: 0.75rem;">সদস্যবৃন্দ</h3>
                    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 1.5rem;">আমাদের সক্রিয় সদস্য</p>
                    <button class="neu-btn" style="background: linear-gradient(135deg, var(--green-400), var(--teal-400)); color: white;">বিস্তারিত দেখুন</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Details Section -->
    <section id="detailsSection" style="background: var(--cream); padding: 4rem 1.5rem; display: none;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <button class="neu-btn" onclick="hideDetails()"><i class="fas fa-arrow-left"></i> ফিরে যান</button>
            </div>
            <div id="detailsContent" class="neu-card" style="padding: 3rem;"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="neu-footer">
        <div class="footer-container">
            <div class="footer-bottom" style="justify-content: center; padding: 2rem 0;">
                <span>© ২০২৬ বারাকাহ ফাইন্যান্স। সর্বস্বত্ব সংরক্ষিত।</span>
            </div>
        </div>
    </footer>

    <script src="../js/simple-auth.js"></script>
    <script src="../js/live-counter.js"></script>
    <script src="../js/universal-nav.js"></script>
    <script>
        function showDetails(type) {
            const section = document.getElementById('detailsSection');
            const content = document.getElementById('detailsContent');
            let html = '';
            
            if (type === 'committee') {
                html = `<h2 style="text-align:center;margin-bottom:2rem;">👔 কমিটি সদস্যবৃন্দ</h2>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem;">
                        <div class="neu-card-sm" style="padding:1.5rem;text-align:center;">
                            <h4>জনাব সাইফুল্লাহ</h4>
                            <div class="neu-badge" style="background:var(--teal-400);color:white;margin:0.5rem 0;">সভাপতি</div>
                            <p style="font-size:12px;">০১৭৩৭১৩১০৯৫</p>
                        </div>
                        <div class="neu-card-sm" style="padding:1.5rem;text-align:center;">
                            <h4>মাওলানা ইমরান হোসাইন কাসেমী</h4>
                            <div class="neu-badge" style="background:var(--green-400);color:white;margin:0.5rem 0;">সহ-সভাপতি</div>
                            <p style="font-size:12px;">০১৩১৭১২১৮২৬</p>
                        </div>
                        <div class="neu-card-sm" style="padding:1.5rem;text-align:center;">
                            <h4>জনাব মুহিব্বুল্লাহ আজাদ</h4>
                            <div class="neu-badge" style="background:var(--gold);color:var(--dark-green);margin:0.5rem 0;">সাধারণ সম্পাদক</div>
                            <p style="font-size:12px;">০১৭১৭২৬৭০০৫</p>
                        </div>
                        <div class="neu-card-sm" style="padding:1.5rem;text-align:center;">
                            <h4>জনাব আনোয়ার হোসেন সেলিম</h4>
                            <div class="neu-badge" style="background:var(--gold);color:var(--dark-green);margin:0.5rem 0;">কোষাধ্যক্ষ</div>
                            <p style="font-size:12px;">০১৬৪৮২৪৮০০৬</p>
                        </div>
                    </div>`;
            } else if (type === 'employees') {
                html = `<h2 style="text-align:center;">💼 কর্মচারীবৃন্দ</h2>
                    <p style="text-align:center;color:var(--text-muted);margin:2rem 0;">শীঘ্রই আপডেট করা হবে</p>`;
            } else if (type === 'members') {
                html = `<h2 style="text-align:center;">👥 সদস্যবৃন্দ</h2>
                    <div class="neu-card-sm" style="text-align:center;padding:3rem;margin:2rem 0;">
                        <div style="font-size:3rem;margin-bottom:1rem;">👥</div>
                        <div style="font-size:2.5rem;font-weight:700;color:var(--teal-600);margin-bottom:1rem;">০</div>
                        <p style="color:var(--text-muted);">মোট সদস্য</p>
                    </div>`;
            }
            
            content.innerHTML = html;
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }

        function hideDetails() {
            document.getElementById('detailsSection').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
